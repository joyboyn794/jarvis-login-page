<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Jarvis AI OS — Sign In</title>
<style>
  :root{
    --bg-0:#04060d;
    --bg-1:#070b16;
    --blue-glow:#3aa8ff;
    --blue-core:#8fe3ff;
    --blue-mid:#1c6fe0;
    --blue-deep:#0d3f9e;
    --card-border:rgba(90,150,255,0.18);
    --text-hi:#f2f6ff;
    --text-lo:#7c8aa5;
    --green:#3ddc84;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:
      radial-gradient(ellipse 500px 400px at 12% 28%, rgba(58,168,255,0.10), transparent 60%),
      radial-gradient(ellipse 400px 400px at 88% 14%, rgba(58,168,255,0.14), transparent 60%),
      radial-gradient(ellipse 900px 700px at 50% -10%, rgba(30,80,170,0.16), transparent 65%),
      var(--bg-0);
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Arial, sans-serif;
    color:var(--text-hi);
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    padding:48px 20px;
    overflow-x:hidden;
    position:relative;
  }
  /* faint starfield dots */
  body::before{
    content:"";
    position:fixed; inset:0;
    background-image:
      radial-gradient(rgba(120,160,255,0.35) 1px, transparent 1px);
    background-size: 46px 46px;
    background-position: 0 0;
    opacity:0.35;
    pointer-events:none;
    mask-image: radial-gradient(ellipse 900px 900px at 50% 20%, black, transparent 75%);
  }

  .stage{
    position:relative;
    width:100%;
    max-width:440px;
    display:flex;
    flex-direction:column;
    align-items:center;
    z-index:1;
  }

  /* ---- HUD emblem ---- */
  .emblem-wrap{
    width:220px; height:220px;
    margin-bottom:6px;
    filter: drop-shadow(0 0 30px rgba(58,168,255,0.45));
  }
  .core-glow{
    animation: pulse 3.2s ease-in-out infinite;
    transform-origin:center;
  }
  .ring-slow{ animation: spin 22s linear infinite; transform-origin:110px 110px; }
  .ring-slow-rev{ animation: spinRev 30s linear infinite; transform-origin:110px 110px; }
  .ring-fast{ animation: spin 14s linear infinite; transform-origin:110px 110px; }
  @keyframes spin{ from{transform:rotate(0deg);} to{transform:rotate(360deg);} }
  @keyframes spinRev{ from{transform:rotate(360deg);} to{transform:rotate(0deg);} }
  @keyframes pulse{
    0%,100%{ opacity:0.85; transform:scale(1); }
    50%{ opacity:1; transform:scale(1.06); }
  }

  h1.brand{
    font-size:2.5rem;
    font-weight:800;
    letter-spacing:0.5px;
    margin:8px 0 4px;
    text-align:center;
  }
  p.tagline{
    color:var(--text-lo);
    font-size:0.98rem;
    margin:0 0 28px;
    text-align:center;
  }

  /* ---- Card ---- */
  .card{
    width:100%;
    background: linear-gradient(180deg, rgba(16,22,38,0.85), rgba(8,12,22,0.9));
    border:1px solid var(--card-border);
    border-radius:22px;
    padding:26px 26px 22px;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.02) inset,
      0 20px 60px rgba(0,0,0,0.55),
      0 0 40px rgba(40,110,220,0.10);
    backdrop-filter: blur(6px);
  }

  .tabs{
    display:flex;
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.06);
    border-radius:999px;
    padding:5px;
    margin-bottom:22px;
    gap:4px;
  }
  .tab{
    flex:1;
    text-align:center;
    padding:11px 0;
    border-radius:999px;
    font-size:0.95rem;
    font-weight:600;
    color:var(--text-lo);
    cursor:pointer;
    border:none;
    background:transparent;
    transition:all .25s ease;
    font-family:inherit;
  }
  .tab.active{
    color:#fff;
    background:linear-gradient(135deg,#2f6fe0,#1652b8);
    box-shadow:0 4px 18px rgba(30,90,200,0.55);
  }

  .field{
    position:relative;
    margin-bottom:16px;
  }
  .field input{
    width:100%;
    background:rgba(255,255,255,0.02);
    border:1px solid rgba(255,255,255,0.09);
    border-radius:12px;
    padding:15px 46px;
    font-size:0.95rem;
    color:var(--text-hi);
    outline:none;
    font-family:inherit;
    transition:border-color .2s ease, background .2s ease;
  }
  .field input::placeholder{ color:#5c6a86; }
  .field input:focus{
    border-color:rgba(90,160,255,0.55);
    background:rgba(58,168,255,0.05);
  }
  .field .icon-left{
    position:absolute; left:16px; top:50%; transform:translateY(-50%);
    width:18px; height:18px; color:#6b7a99; pointer-events:none;
  }
  .field .icon-right{
    position:absolute; right:16px; top:50%; transform:translateY(-50%);
    width:19px; height:19px; color:#6b7a99; cursor:pointer;
    background:none; border:none; padding:0;
  }

  .submit-btn{
    width:100%;
    padding:15px 20px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#3a7bef,#154fb0);
    color:#fff;
    font-size:1rem;
    font-weight:700;
    font-family:inherit;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    cursor:pointer;
    box-shadow:0 8px 26px rgba(30,90,210,0.45);
    transition:transform .15s ease, box-shadow .15s ease;
    margin-top:4px;
  }
  .submit-btn:hover{ transform:translateY(-1px); box-shadow:0 10px 30px rgba(30,90,210,0.6); }
  .submit-btn:active{ transform:translateY(0); }
  .submit-btn svg{ width:16px; height:16px; }

  .divider{
    display:flex;
    align-items:center;
    gap:14px;
    margin:22px 0 16px;
    color:#4d5972;
    font-size:0.72rem;
    letter-spacing:1.5px;
  }
  .divider::before, .divider::after{
    content:"";
    flex:1;
    height:1px;
    background:rgba(255,255,255,0.08);
  }

  .status-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:0.82rem;
    color:#8b96ad;
    padding-top:4px;
    border-top:1px solid rgba(255,255,255,0.06);
    padding-top:14px;
  }
  .status-row .item{ display:flex; align-items:center; gap:7px; }
  .dot{
    width:8px; height:8px; border-radius:50%;
    background:var(--green);
    box-shadow:0 0 8px var(--green);
    animation:blink 2s ease-in-out infinite;
  }
  @keyframes blink{ 0%,100%{opacity:1;} 50%{opacity:0.4;} }
  .chip-icon{ width:16px; height:16px; color:#5a9dff; }

  .footer-note{
    margin-top:26px;
    text-align:center;
    font-size:0.8rem;
    color:#54607a;
  }

  @media (prefers-reduced-motion: reduce){
    .core-glow,.ring-slow,.ring-slow-rev,.ring-fast,.dot{ animation:none !important; }
  }
</style>
</head>
<body>
  <div class="stage">

    <div class="emblem-wrap">
      <svg viewBox="0 0 220 220" width="220" height="220">
        <defs>
          <radialGradient id="coreGrad" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#dff6ff"/>
            <stop offset="45%" stop-color="#7fd8ff"/>
            <stop offset="100%" stop-color="#1c6fe0" stop-opacity="0.2"/>
          </radialGradient>
          <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="2.2"/>
          </filter>
        </defs>

        <g class="ring-slow" stroke="#3aa8ff" fill="none" stroke-linecap="round">
          <circle cx="110" cy="110" r="95" stroke-width="2.4" stroke-dasharray="40 18 60 30"/>
        </g>
        <g class="ring-slow-rev" stroke="#5cc2ff" fill="none" stroke-linecap="round">
          <circle cx="110" cy="110" r="72" stroke-width="3" stroke-dasharray="8 10 30 14 20 8"/>
        </g>
        <g class="ring-fast" stroke="#8fe3ff" fill="none" stroke-linecap="round">
          <circle cx="110" cy="110" r="50" stroke-width="2.2" stroke-dasharray="26 12 10 40"/>
        </g>

        <g class="core-glow">
          <circle cx="110" cy="110" r="26" fill="url(#coreGrad)" filter="url(#soft)"/>
          <circle cx="110" cy="110" r="9" fill="#eafcff"/>
        </g>
      </svg>
    </div>

    <h1 class="brand">Jarvis AI OS</h1>
    <p class="tagline">Intelligent assistant at your service</p>

    <div class="card">
      <div class="tabs">
        <button class="tab active" id="tabSignin" type="button">Sign In</button>
        <button class="tab" id="tabRegister" type="button">Register</button>
      </div>

      <form id="authForm">
        <div class="field">
          <svg class="icon-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M3 6.5A1.5 1.5 0 0 1 4.5 5h15A1.5 1.5 0 0 1 21 6.5v11A1.5 1.5 0 0 1 19.5 19h-15A1.5 1.5 0 0 1 3 17.5v-11Z"/>
            <path d="m3.5 6 8.5 6.5L20.5 6"/>
          </svg>
          <input type="email" placeholder="Email" required>
        </div>

        <div class="field">
          <svg class="icon-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <rect x="5" y="10.5" width="14" height="9.5" rx="2"/>
            <path d="M8 10.5V7.8a4 4 0 0 1 8 0v2.7"/>
          </svg>
          <input type="password" id="pwInput" placeholder="Password" required>
          <button type="button" class="icon-right" id="pwToggle" aria-label="Show password">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M1.5 12S5 5 12 5s10.5 7 10.5 7-3.5 7-10.5 7S1.5 12 1.5 12Z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">
          <span>Sign In</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <path d="M5 12h14M13 6l6 6-6 6"/>
          </svg>
        </button>
      </form>

      <div class="divider">JARVIS v0.1</div>

      <div class="status-row">
        <div class="item"><span class="dot"></span> Systems Online</div>
        <div class="item">
          <svg class="chip-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
            <rect x="7" y="7" width="10" height="10" rx="1.5"/>
            <path d="M9.5 3.5v3M14.5 3.5v3M9.5 17.5v3M14.5 17.5v3M3.5 9.5h3M3.5 14.5h3M17.5 9.5h3M17.5 14.5h3"/>
          </svg>
          Groq / Llama 3.1
        </div>
      </div>
    </div>

    <p class="footer-note">Powered by Groq &nbsp;·&nbsp; Free &amp; Open Source</p>
  </div>

  <script>
    const tabSignin = document.getElementById('tabSignin');
    const tabRegister = document.getElementById('tabRegister');
    const submitBtn = document.getElementById('submitBtn').querySelector('span');

    tabSignin.addEventListener('click', () => {
      tabSignin.classList.add('active');
      tabRegister.classList.remove('active');
      submitBtn.textContent = 'Sign In';
    });
    tabRegister.addEventListener('click', () => {
      tabRegister.classList.add('active');
      tabSignin.classList.remove('active');
      submitBtn.textContent = 'Create Account';
    });

    const pwInput = document.getElementById('pwInput');
    const pwToggle = document.getElementById('pwToggle');
    pwToggle.addEventListener('click', () => {
      pwInput.type = pwInput.type === 'password' ? 'text' : 'password';
    });

    document.getElementById('authForm').addEventListener('submit', e => {
      e.preventDefault();
    });
  </script>
</body>
</html>
